services:
  db:
    # Banco PostgreSQL usado pela aplicacao.
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # Valores lidos do .env; os defaults ajudam em ambiente local.
      POSTGRES_DB: ${POSTGRES_DB:-dashboard_escolar}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      # Mantem os dados do banco mesmo se o container for recriado.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # So libera a subida da app quando o banco estiver pronto.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    # Servico da aplicacao Spring Boot.
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        # Espera o healthcheck do banco antes de iniciar a aplicacao.
        condition: service_healthy
    environment:
      # A aplicacao acessa o banco pelo nome do servico "db".
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-dashboard_escolar}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # Ajustes comuns para ambiente conteinerizado.
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      SPRING_JPA_FORMAT_SQL: ${SPRING_JPA_FORMAT_SQL:-false}
      SERVER_PORT: ${SERVER_PORT:-8081}
    ports:
      # Mapeia a porta da maquina para a porta interna da aplicacao.
      - "${APP_PORT:-8081}:${SERVER_PORT:-8081}"

volumes:
  # Volume nomeado para persistencia do PostgreSQL.
  postgres_data:

<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modoEdicao ? 'Editar ' + tituloFormulario : tituloFormulario}">Novo Card</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="form-page">

<div class="container">
    <div class="form-header">
        <h1 th:text="${modoEdicao ? 'Editar ' + tituloFormulario : tituloFormulario}">Novo Card</h1>
        <p class="texto-lateral">
            Preencha as informacoes principais para publicar este card no dashboard.
        </p>
    </div>

    <form th:action="${modoEdicao ? '/atualizar-card/' + cardId : '/salvar-card'}"
          method="post"
          class="formulario"
          th:object="${card}">

        <div class="form-alerta campo-completo" th:if="${#fields.hasAnyErrors()}">
            <p>Corrija os campos destacados antes de salvar.</p>
            <ul class="lista-erros" th:if="${#fields.hasGlobalErrors()}">
                <li th:each="erro : ${#fields.globalErrors()}" th:text="${erro}">Erro</li>
            </ul>
        </div>

        <div class="campo">
            <label for="titulo">Titulo</label>
            <input type="text" id="titulo" th:field="*{titulo}" required th:classappend="${#fields.hasErrors('titulo')} ? ' campo-invalido'">
            <small class="campo-erro" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}">Erro</small>
        </div>

        <div class="campo">
            <label for="categoria">Tipo de Card</label>
            <select id="categoria" th:field="*{categoria}" required th:classappend="${#fields.hasErrors('categoria')} ? ' campo-invalido'">
                <option value="EVENTO">Novo Evento</option>
                <option value="FALTA_PROFESSOR">Falta de Professores</option>
                <option value="HORARIO_PROFESSOR">Horarios Professores - Rotativo</option>
                <option value="ROTINA_ADMINISTRATIVA">Rotina Administrativa</option>
                <option value="ROTINA_AUXILIAR">Rotina Auxiliares</option>
                <option value="AVISO_NOTA">Avisos / Notas</option>
            </select>
            <small class="campo-erro" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}">Erro</small>
        </div>

        <div class="campo">
            <label for="prioridade">Prioridade</label>
            <select id="prioridade" th:field="*{prioridade}" required th:classappend="${#fields.hasErrors('prioridade')} ? ' campo-invalido'">
                <option value="">Selecione</option>
                <option value="BAIXA">Baixa</option>
                <option value="MEDIA">Media</option>
                <option value="ALTA">Alta</option>
            </select>
            <small class="campo-erro" th:if="${#fields.hasErrors('prioridade')}" th:errors="*{prioridade}">Erro</small>
        </div>

        <div class="campo">
            <label for="status">Status</label>
            <select id="status" th:field="*{status}" required th:classappend="${#fields.hasErrors('status')} ? ' campo-invalido'">
                <option value="">Selecione</option>
                <option value="PENDENTE">Pendente</option>
                <option value="EM_ANDAMENTO">Em andamento</option>
                <option value="CONCLUIDO">Concluido</option>
            </select>
            <small class="campo-erro" th:if="${#fields.hasErrors('status')}" th:errors="*{status}">Erro</small>
        </div>

        <div class="campo">
            <label for="dataEvento">Data</label>
            <input type="date" id="dataEvento" th:field="*{dataEvento}" th:classappend="${#fields.hasErrors('dataEvento')} ? ' campo-invalido'">
            <small class="campo-erro" th:if="${#fields.hasErrors('dataEvento')}" th:errors="*{dataEvento}">Erro</small>
        </div>

        <div class="campo">
            <label for="responsavel">Responsavel</label>
            <input type="text" id="responsavel" th:field="*{responsavel}" placeholder="Ex: Coordenacao" th:classappend="${#fields.hasErrors('responsavel')} ? ' campo-invalido'">
            <small class="campo-erro" th:if="${#fields.hasErrors('responsavel')}" th:errors="*{responsavel}">Erro</small>
        </div>

        <div class="campo campo-completo">
            <label for="descricao">Descricao</label>
            <textarea id="descricao" th:field="*{descricao}" rows="3" th:classappend="${#fields.hasErrors('descricao')} ? ' campo-invalido'"></textarea>
            <small class="campo-erro" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}">Erro</small>
        </div>

        <div class="campo campo-completo">
            <label for="observacoes">Observacoes</label>
            <textarea id="observacoes" th:field="*{observacoes}" rows="3"
                      th:classappend="${#fields.hasErrors('observacoes')} ? ' campo-invalido'"
                      placeholder="Informacoes adicionais para a equipe"></textarea>
            <small class="campo-erro" th:if="${#fields.hasErrors('observacoes')}" th:errors="*{observacoes}">Erro</small>
        </div>

        <div class="acoes campo-completo">
            <button type="submit" class="btn-editar"
                    th:text="${modoEdicao} ? 'Atualizar' : 'Salvar e publicar'">
                Salvar
            </button>

            <a href="/" class="btn-deletar">Cancelar</a>
        </div>
    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Escolar</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container">
        <h1>Dashboard Escolar</h1>
        <p class="subtitulo">Lista de cards cadastrados no sistema</p>

        <div class="topo">
            <a href="/novo-card" class="botao">+ Novo Card</a>
        </div>

        <div class="lista-cards">
            <div class="card" th:each="card : ${cards}">
                <h2 th:text="${card.titulo}">Título do Card</h2>
                <p th:text="${card.descricao}">Descrição do card</p>

                <div class="info">
                    <span><strong>Categoria:</strong> <span th:text="${card.categoria}"></span></span>
                    <span><strong>Prioridade:</strong> <span th:text="${card.prioridade}"></span></span>
                </div>

                <div class="info">
                    <span><strong>Criado em:</strong> <span th:text="${card.dataCriacao}"></span></span>
                </div>

                <div class="acoes">
                    <a th:href="@{'/editar-card/' + ${card.id}}" class="btn-editar">Editar</a>
                    <a th:href="@{'/deletar-card/' + ${card.id}}" class="btn-deletar">Excluir</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>

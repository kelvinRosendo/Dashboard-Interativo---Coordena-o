<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Escolar</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container">

        <!-- 🔹 Título principal -->
        <h1>Dashboard Escolar</h1>

        <!-- 🔹 Subtítulo -->
        <p class="subtitulo">Painel de organização da coordenação escolar</p>

        <!-- 🔹 Botão para criar novo card -->
        <div class="topo">
            <a href="/novo-card" class="botao">+ Novo Card</a>
        </div>

        <!-- 🔹 Lista de cards -->
        <div class="lista-cards">

            <!-- 🔹 Um card para cada item vindo do backend -->
            <div class="card" th:each="card : ${cards}">

                <!-- 🔹 Título -->
                <h2 th:text="${card.titulo}">Título do Card</h2>

                <!-- 🔹 Descrição -->
                <p th:text="${card.descricao}">Descrição do card</p>

                <!-- 🔹 Informações principais -->
                <div class="info">
                    <span>
                        <strong>Categoria:</strong>
                        <span th:text="${card.categoria}">Categoria</span>
                    </span>

                    <span>
                        <strong>Prioridade:</strong>
                        <span class="badge"
                              th:classappend="${card.prioridade.name() == 'ALTA'} ? ' prioridade-alta' :
                                              (${card.prioridade.name() == 'MEDIA'} ? ' prioridade-media' : ' prioridade-baixa')"
                              th:text="${card.prioridade}">
                            Prioridade
                        </span>
                    </span>

                    <span>
                        <strong>Status:</strong>
                        <span class="badge"
                              th:classappend="${card.status.name() == 'PENDENTE'} ? ' status-pendente' :
                                              (${card.status.name() == 'EM_ANDAMENTO'} ? ' status-andamento' : ' status-concluido')"
                              th:text="${card.status}">
                            Status
                        </span>
                    </span>
                </div>

                <!-- 🔹 Informações complementares -->
                <div class="info">
                    <span>
                        <strong>Data do evento:</strong>
                        <span th:text="${card.dataEvento}">Data do evento</span>
                    </span>

                    <span>
                        <strong>Responsável:</strong>
                        <span th:text="${card.responsavel}">Responsável</span>
                    </span>
                </div>

                <!-- 🔹 Observações -->
                <div class="info">
                    <span>
                        <strong>Observações:</strong>
                        <span th:text="${card.observacoes}">Observações</span>
                    </span>
                </div>

                <!-- 🔹 Data de criação -->
                <div class="info">
                    <span>
                        <strong>Criado em:</strong>
                        <span th:text="${card.dataCriacao}">Data de criação</span>
                    </span>
                </div>

                <!-- 🔹 Botões -->
                <div class="acoes">
                    <a th:href="@{'/editar-card/' + ${card.id}}" class="btn-editar">Editar</a>
                    <a th:href="@{'/deletar-card/' + ${card.id}}" class="btn-deletar">Excluir</a>
                </div>

            </div>
        </div>
    </div>

</body>
</html>

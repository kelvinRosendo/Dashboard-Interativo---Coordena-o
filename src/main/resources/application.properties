# ===============================
# 🔹 CONFIGURAÇÃO DO BANCO DE DADOS (PostgreSQL)
# ===============================

# URL de conexão com o banco
# Formato: jdbc:postgresql://HOST:PORTA/NOME_DO_BANCO
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dashboard_escolar}

# Usuário do PostgreSQL
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}

# Senha do PostgreSQL (TROCAR PELA SUA)
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

# Driver do PostgreSQL
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

# Porta da aplicacao
server.port=${SERVER_PORT:8081}


# ===============================
# 🔹 CONFIGURAÇÃO DO JPA / HIBERNATE
# ===============================

# Dialeto do PostgreSQL (forma como o Hibernate conversa com o banco)
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

# Estratégia de criação/atualização das tabelas
# update = cria e atualiza automaticamente as tabelas
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}


# ===============================
# 🔹 LOGS (AJUDA NO DESENVOLVIMENTO)
# ===============================

# Mostra as queries SQL no terminal
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# Deixa o SQL mais organizado (bonito de ler)
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}

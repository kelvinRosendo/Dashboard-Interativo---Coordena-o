# Server block para publicar a aplicacao Spring Boot via Nginx.
# Ajuste o server_name se quiser restringir a um IP ou nome especifico.
server {
    listen 80;
    # Use um nome sem espacos e sem acentos para facilitar o acesso na rede.
    server_name 192.168.1.20 localhost dashboard-coordenacao dashboard-coordenacao.local;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
